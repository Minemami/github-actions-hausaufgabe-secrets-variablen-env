name: 03 Secrets Demo

on:
  workflow_dispatch:

jobs:
  secrets-demo:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Shell Skripte ausführbar machen
        run: chmod +x scripts/*.sh

      - name: Secret an Bash Skript übergeben
        env:
          DEMO_API_TOKEN: ${{ secrets.DEMO_API_TOKEN }}
        run: bash scripts/03_secret_check.sh

      - name: Secret Report hochladen
        uses: actions/upload-artifact@v4
        with:
          name: secret-report
          path: output/secret-report.txt